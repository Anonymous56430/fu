<!DOCTYPE html>
<html>
<body>

<h1>CORS Test</h1>

<pre id="result"></pre>

<script>

// ===== استخدم Proxy بديل =====
const PROXY_URL = "https://corsproxy.io/?";
const TARGET_URL = "https://www.trip.com/restapi/soa2/24884/json/getConfiguration?url=https://omar.trip.com";

// البيانات المرسلة لـ Trip.com
const tripData = {
    head: {
        locale: "ar-XX",
        currency: "USD",
        vID: "1783978788105.8e68P1hvGdSY"
    },
    platform: "Online",
    componentType: "online-app-download-universal",
    version: "6.0.5",
    pageId: "10320668148",
    aid: 0,
    sid: 0,
    customId: "side",
    customParam: {}
};

// ===== إرسال الطلب عبر Proxy =====
fetch(PROXY_URL + encodeURIComponent(TARGET_URL), {
    method: "POST",
    headers: {
        "Content-Type": "application/json"
    },
    body: JSON.stringify(tripData)
})

.then(async r => {
    const status = r.status;
    const responseText = await r.text();
    
    document.getElementById("result").textContent = 
    "Status: " + status + "\n\n" + responseText;
})

.catch(e => {
    document.getElementById("result").textContent = 
    "Blocked:\n" + e;
});

</script>

</body>
</html>
