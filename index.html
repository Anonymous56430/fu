<!DOCTYPE html>
<html>
<body>

<h1>CORS Test</h1>

<pre id="result"></pre>

<script>

// ===== إرسال الطلب إلى chloro.trip.com =====
const TARGET_URL = "https://chloro.trip.com/v2/d";

// ===== البيانات (body) المرسلة =====
const requestBody = "data=&version=11&serverName=http://evail.com";

// ===== إرسال الطلب =====
fetch(TARGET_URL, {
    method: "POST",
    headers: {
        "Content-Type": "application/x-www-form-urlencoded; charset=UTF-8",
        "Accept": "*/*",
        "Origin": "https://www.com"
    },
    body: requestBody
})

.then(async r => {
    const status = r.status;
    const responseText = await r.text();
    
    document.getElementById("result").textContent = 
    "Status: " + status + "\n\n" + responseText;
    
    // محاولة استخراج البيانات من الرد
    try {
        const jsonResponse = JSON.parse(responseText);
        console.log("✅ الرد:", jsonResponse);
    } catch(e) {
        console.log("الرد ليس JSON");
    }
})

.catch(e => {
    document.getElementById("result").textContent = 
    "Blocked:\n" + e;
});

</script>

</body>
</html>
